# Inferred-attributes experiments: Seldonian / naive with bound_prop_ucb_constraint_no_safety
# Same hyperparameters as main branch (epsilon, fail_prob, etc.); safety data has no inferred attributes
mode: seldonian
fixed_lambda: 1.0
seed: 42
output_dir: ./outputs
global_results_path: ./outputs/final_results_inferred.json
dataset_name: adult_income
sensitive_attribute: gender
behavior_policy_type: random
bandit_data_dir: ./bandit_datasets
constraint_type: students-ttest
disparity_type: reward
num_epochs: 100
batch_size: 128
param_opt_lr: 1.0e-4
dual_opt_lr: 5.0e-2
epsilon: 0.295
fail_prob: 0.05
log_lambda_max: 2
eval_freq: 25
train_frac: 1.0
hidden_dim: 128
inferred_proportion: 0.5
fpr: 0.2
fnr: 0.2
